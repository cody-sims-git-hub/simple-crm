name: Security & Quality CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Dependency vulnerability scan (SCA) against the Composer advisory database
      - name: Audit PHP dependencies
        run: composer audit

      # Static style gate — fails if any file drifts from the project's Pint ruleset
      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Full PHPUnit suite (ownership, scoping, validation, provisioning)
      - name: Run test suite
        run: php artisan test
