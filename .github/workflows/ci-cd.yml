name: CI / Deploy

# CI runs on every PR and every push to main.
# Production deploy ONLY runs on push to main, and ONLY after the CI job
# passes (enforced by `needs: ci`). Pull requests never deploy.
# Docs-only changes (Markdown, LICENSE) skip the pipeline entirely so a README
# tweak doesn't trigger a production redeploy.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# Cancel superseded CI runs on the same ref; never cancel a deploy mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    # Allow the green-main badge step to push the test count to the `badges` branch.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Dependency vulnerability scan (SCA) against the Composer advisory database.
      - name: Audit PHP dependencies
        run: composer audit

      # Static style gate — fails if any file drifts from the project's Pint ruleset.
      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      # Build gate — front-end assets must compile (same build the image runs).
      - name: Build front-end assets
        run: npm run build

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Full PHPUnit suite (tests use in-memory SQLite — no DB service needed).
      # --log-junit produces a machine-readable report for the dynamic badge.
      - name: Run test suite
        run: php artisan test --log-junit junit.xml

      # Publish the live PHPUnit count to the `badges` branch as a shields.io
      # endpoint JSON. Only on a green push to main (this step runs after the
      # test gate, so a red suite never updates the badge). Uses the built-in
      # GITHUB_TOKEN — no PAT or external gist required.
      - name: Publish test-count badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(grep -o '<testcase ' junit.xml | wc -l | tr -d ' ')
          echo "PHPUnit test count: $total"
          printf '{"schemaVersion":1,"label":"PHPUnit","message":"%s passing","color":"3FB950"}' "$total" > tests.json
          tmp=$(mktemp -d); cp tests.json "$tmp/"; cd "$tmp"
          git init -q && git checkout -q -b badges && git add tests.json
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -q -m "chore: update PHPUnit test-count badge ($total passing)"
          git push -q -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges

  deploy:
    name: Deploy to production
    # HARD GATE: deploy cannot start unless the `ci` job succeeded.
    needs: ci
    # Only on a push to main — never on PRs, never on other branches.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize production deploys so two pushes can't deploy concurrently.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      # The VPS is reachable only over Tailscale (CGNAT address), so the runner
      # joins the tailnet first using a reusable, pre-authorized auth key.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # SSH auth is handled by Tailscale SSH (the tailnet ACL authorizes the
      # CI node -> VPS as this user), so no SSH private key is needed here.
      - name: Deploy over Tailscale SSH
        env:
          HOST: ${{ secrets.VPS_SSH_HOST }}
          USER: ${{ secrets.VPS_SSH_USER }}
          DIR:  ${{ secrets.VPS_DEPLOY_DIR }}
        # $USER/$HOST/$DIR are expanded by the runner shell (from `env:` above)
        # and baked into the command string sent to the VPS. A rebuilt image
        # makes `up -d` recreate the container, which re-runs the serversideup
        # boot automations (config:cache + migrate) against .env.
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$USER@$HOST" \
            "set -e; cd '$DIR'; git pull --ff-only; docker compose build; docker compose up -d; docker image prune -f"

      # Confirm the new container is actually serving before calling it a success.
      - name: Verify production health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://demo.simsdigitalpartners.com/up || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 6
          done
          echo "Health check never returned 200"; exit 1
