# Production deployment for SimpleCRM.
# Runs on the shared external `proxy` network so the Caddy reverse proxy can
# reach it by container name (reverse_proxy crm-app:8080). TLS is handled by Caddy.
services:
  crm-app:
    build: .
    image: simple-crm:latest
    container_name: crm-app
    restart: unless-stopped
    environment:
      # serversideup init automations (read from process env, not Laravel's .env)
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      AUTORUN_LARAVEL_ROUTE_CACHE: "true"
      AUTORUN_LARAVEL_VIEW_CACHE: "true"
    volumes:
      # Laravel application config (created on the host from .env.production.example)
      - ./.env:/var/www/html/.env:ro
      # Persisted SQLite database — survives image rebuilds
      - crm-data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  proxy:
    external: true

volumes:
  crm-data:
